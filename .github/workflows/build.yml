name: Build DiagROM

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: trixitron/m68k-amigaos-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y python3 python3-pip zip make gcc curl && pip3 install libclang==16.0.6

      - name: Update vasm
        run: |
          curl -sO http://sun.hasenbraten.de/vasm/release/vasm.tar.gz
          tar xzf vasm.tar.gz
          make -C vasm CPU=m68k SYNTAX=mot
          cp vasm/vasmm68k_mot /opt/amiga/bin/vasmm68k_mot

      - name: Build
        run: make CFLAGS="-DDEBUG=0 -DROM_BASE=0xF80000 -mcpu=68000 -O0 -ffixed-a6 -fomit-frame-pointer -I./ndk/Include_H -I. -Isrcs"

      - name: Dump linker map on failure
        if: failure()
        run: cat build/diagrom_nosum.exe.txt || true

      - name: Verify ROM checksums (host-side)
        run: python3 tools/verify_checksums.py diagrom.rom

      - name: Set release name (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: echo "BETA_NAME=DiagROM-V2-Beta-$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Package binaries
        run: |
          mkdir -p DiagROM
          cp diagrom.rom DiagROM/
          cp 16bit.bin 32bitHI.bin 32bitLO.bin CD32.bin DiagROM/
          cp Changes.txt README.md DiagROM/
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            cp Daily.txt DiagROM/
            zip -r ${{ env.BETA_NAME }}.zip DiagROM/
          else
            zip -r DiagROM-${{ github.ref_name }}.zip DiagROM/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref == 'refs/heads/dev' && env.BETA_NAME || format('DiagROM-{0}', github.ref_name) }}
          path: ${{ github.ref == 'refs/heads/dev' && format('{0}.zip', env.BETA_NAME) || format('DiagROM-{1}.zip', '', github.ref_name) }}
          retention-days: 90

      - name: Delete old beta releases
        if: github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, os, urllib.request, urllib.error

          token = os.environ['GH_TOKEN']
          repo  = os.environ['GITHUB_REPOSITORY']
          api   = f'https://api.github.com/repos/{repo}'
          hdrs  = {'Authorization': f'Bearer {token}',
                   'Accept': 'application/vnd.github+json',
                   'X-GitHub-Api-Version': '2022-11-28'}

          def gh(method, path, expect=(200, 204)):
              req = urllib.request.Request(f'{api}{path}', headers=hdrs, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()) if r.status == 200 else None
              except urllib.error.HTTPError as e:
                  if e.code not in expect:
                      print(f'  {method} {path} -> {e.code}')
                  return None

          releases = gh('GET', '/releases?per_page=100') or []
          for rel in releases:
              tag = rel['tag_name']
              if tag.startswith('beta-'):
                  print(f'Deleting release + tag: {tag}')
                  gh('DELETE', f'/releases/{rel["id"]}', expect=(204,))
                  gh('DELETE', f'/git/refs/tags/{tag}',  expect=(204,))
          EOF

      - name: Create beta release (dev branch)
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-${{ github.run_id }}
          name: ${{ env.BETA_NAME }}
          prerelease: true
          files: ${{ env.BETA_NAME }}.zip
          body: |
            Automated daily beta build from the `dev` branch.
            Built from commit ${{ github.sha }} on ${{ github.run_id }}.

      - name: Create GitHub Release (stable tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DiagROM-${{ github.ref_name }}.zip
