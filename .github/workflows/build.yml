name: Build DiagROM

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: trixitron/m68k-amigaos-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y python3 python3-pip libclang-dev zip && pip3 install clang

      - name: Build
        run: make

      - name: Package binaries
        run: |
          mkdir -p dist
          cp diagrom.rom dist/
          cp 16bit.bin 32bitHI.bin 32bitLO.bin CD32.bin dist/
          cp build/diagrom.exe dist/
          cd dist && zip -r ../DiagROM-V2.0-${{ github.ref_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiagROM-V2.0-${{ github.ref_name }}
          path: DiagROM-*.zip
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DiagROM-*.zip
