name: Build DiagROM

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: trixitron/m68k-amigaos-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y python3 python3-pip zip make gcc curl && pip3 install libclang==16.0.6

      - name: Update vasm
        run: |
          curl -sO http://sun.hasenbraten.de/vasm/release/vasm.tar.gz
          tar xzf vasm.tar.gz
          make -C vasm CPU=m68k SYNTAX=mot
          cp vasm/vasmm68k_mot /opt/amiga/bin/vasmm68k_mot

      - name: Build
        run: make CFLAGS="-DDEBUG=0 -DROM_BASE=0xF80000 -mcpu=68000 -O2 -ffixed-a6 -fomit-frame-pointer -I./ndk/Include_H -I. -Isrcs"

      - name: Package binaries
        run: |
          mkdir -p dist
          cp diagrom.rom dist/
          cp 16bit.bin 32bitHI.bin 32bitLO.bin CD32.bin dist/
          zip -r DiagROM-V2.0-${{ github.ref_name }}.zip dist/
          ls -la DiagROM-V2.0-${{ github.ref_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiagROM-V2.0-${{ github.ref_name }}
          path: DiagROM-V2.0-${{ github.ref_name }}.zip
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DiagROM-*.zip
